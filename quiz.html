<main>

    <h1 class="text-center mt-4">Cristiano Ronaldo Fan Quiz ⚽</h1>

    <section class="quiz-container">


        <article id="quiz">
            <h2 class="visually-hidden">Quiz Questions</h2>
            <div id="question" class="question"></div>
            <div id="answers" class="d-grid gap-2"></div>

            <button id="nextBtn" class="btn btn-warning mt-3" onclick="nextQuestion()" style="display:none;">
                Next
            </button>
        </article>


        <section id="result" class="mt-4" style="display:none;">
            <h2>Results</h2>
            <h3>Your Score: <span id="score"></span>/<span id="total"></span></h3>
            <button class="btn btn-success mt-3" onclick="restartQuiz()">Restart Quiz</button>
        </section>

    </section>

</main>

<footer>
<p>&copy; 2026 Ronaldo Fan Hub | Created by Yaone Phalane</p>
</footer>

<script>
const quizData = [
    {
        question: "Which club did Ronaldo join in 2003?",
        options: ["Manchester United", "Real Madrid", "Sporting CP", "Juventus"],
        answer: "Manchester United"
    },
    {
        question: "How many Ballon d'Or awards has Ronaldo won as of 2023?",
        options: ["4", "5", "6", "7"],
        answer: "5"
    },
    {
        question: "Which number does Ronaldo famously wear?",
        options: ["7", "9", "10", "11"],
        answer: "7"
    },
    {
        question: "For which national team does Ronaldo play?",
        options: ["Spain", "Portugal", "Brazil", "Italy"],
        answer: "Portugal"
    },
    {
        question: "Which club did Ronaldo play for after leaving Real Madrid in 2018?",
        options: ["Juventus", "Manchester United", "Sporting CP", "Paris Saint-Germain"],
        answer: "Juventus"
    }
];

let currentQuestion = 0;
let score = 0;

function showQuestion() {
    document.getElementById('nextBtn').style.display = 'none';

    const q = quizData[currentQuestion];
    document.getElementById('question').textContent = q.question;

    const answersDiv = document.getElementById('answers');
    answersDiv.innerHTML = '';

    q.options.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'btn btn-outline-light answer-btn';
        btn.textContent = option;
        btn.onclick = () => selectAnswer(option);
        answersDiv.appendChild(btn);
    });
}

function selectAnswer(selected) {
    const correct = quizData[currentQuestion].answer;

    if (selected === correct) score++;

    const buttons = document.querySelectorAll('.answer-btn');

    buttons.forEach(btn => {
        btn.disabled = true;

        if (btn.textContent === correct) {
            btn.classList.replace('btn-outline-light', 'btn-success');
        } else if (btn.textContent === selected) {
            btn.classList.replace('btn-outline-light', 'btn-danger');
        }
    });

    document.getElementById('nextBtn').style.display = 'inline-block';
}

function nextQuestion() {
    currentQuestion++;

    if (currentQuestion < quizData.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz').style.display = 'none';
    document.getElementById('result').style.display = 'block';

    document.getElementById('score').textContent = score;
    document.getElementById('total').textContent = quizData.length;
}

function restartQuiz() {
    currentQuestion = 0;
    score = 0;

    document.getElementById('quiz').style.display = 'block';
    document.getElementById('result').style.display = 'none';

    showQuestion();
}

showQuestion();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
