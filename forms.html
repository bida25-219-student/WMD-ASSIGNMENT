<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronaldo Fan Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="styles.css"> 

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url('background.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
}
.navbar {
    background-color: rgba(0, 0, 0, 0.9) !important;
}
.overlay {
    background: rgba(0, 0, 0, 0.7);
    min-height: 100vh;
}
.navbar {
    background-color: rgba(0, 0, 0, 0.9) !important;
}
.section {
    padding: 40px 0;
}
.section-title {
    margin-bottom: 20px;
    border-bottom: 2px solid #f5c518;
    display: inline-block;
    padding-bottom: 5px;
}
.form-card {
    max-width: 600px;
    margin: 40px auto;
    background: rgba(0, 0, 0, 0.85);
    padding: 30px;
    border-radius: 15px;
}

input, select, textarea {
    margin-bottom: 15px;
    background: rgba(255,255,255,0.1);
    color: white;
}
.btn-submit {
    background-color: #18f548;
    font-weight: bold;
    color: black;
}
.btn-clear {
    background-color: #dc3545;
}
#ageWarning {
    color: #ff5555;
    display: none;
}
table {
    background: rgba(0,0,0,0.8);
    color: white;
}
footer {
    text-align: center;
    padding: 20px;
    background: rgba(0,0,0,0.9);
    margin-top: 40px;
}
</style>
</head>
<body>
 
<header>
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
    <a class="navbar-brand d-flex align-items-center fw-bold" href="index.html">
        <img src="logo.png" width="45" height="45" class="me-2">
        <span style="color:#f5c518;">Ronaldo</span> Fan Hub
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li> 
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li> 
            <li class="nav-item"><a class="nav-link" href="trophies.html">Trophies</a></li> 
            <li class="nav-item"><a class="nav-link" href="stats.html">Stats</a></li> 
            <li class="nav-item"><a class="nav-link" href="skills.html">Skills</a></li> 
            <li class="nav-item"><a class="nav-link active" href="forms.html">Forms</a></li> 
            <li class="nav-item"><a class="nav-link" href="debate.html">Debate</a></li>
            <li class="nav-item"><a class="nav-link" href="quiz.html">Quiz</a></li> 
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li> 
        </ul>
    </div>
</div>
</nav>
</header>


<main>

<section class="form-card">
<h1 class="text-center mb-4">Join Ronaldo Fans</h1>

<form id="fanForm">

<label for="name">First Name:</label>
<input type="text" id="name" class="form-control" required>

<label for="surname">Surname:</label>
<input type="text" id="surname" class="form-control" required>

<label>Gender:</label>
<div class="mb-3">
    <input type="radio" name="gender" value="Male" required> Male
    <input type="radio" name="gender" value="Female"> Female
</div>

<label for="age">Age:</label>
<input type="number" id="age" class="form-control" min="1" max="100" required>
<span id="ageWarning">Age must be between 1 and 100.</span>

<label for="club">Favorite Version of Ronaldo:</label>
<select id="club" class="form-select" required>
    <option value="">--Select Club--</option>
    <option>Manchester United</option>
    <option>Real Madrid</option>
    <option>Juventus</option>
    <option>Al Nassr</option>
</select>

<label for="reason">Why do you love Ronaldo?</label>
<textarea id="reason" class="form-control" rows="3" required></textarea>

<button type="submit" class="btn btn-submit w-100 mb-2">Submit</button>
<button type="button" id="clearBtn" class="btn btn-clear w-100">Clear</button>

</form>
</section>

<section class="container">
<h2 class="text-center mt-5">Submitted Fans</h2>

<div class="table-responsive">
<table id="fansTable" class="table table-bordered text-center">
<thead>
<tr>
    <th>First Name</th>
    <th>Surname</th>
    <th>Gender</th>
    <th>Age</th>
    <th>Favorite Club</th>
    <th>Reason</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</section>

</main>

<footer>
<p>&copy; 2026 Ronaldo Fan Hub | Created by Yaone Phalane</p>
</footer>

<script>
const form = document.getElementById('fanForm');
const tableBody = document.querySelector('#fansTable tbody');
const table = document.getElementById('fansTable');
const clearBtn = document.getElementById('clearBtn');
const ageInput = document.getElementById('age');
const ageWarning = document.getElementById('ageWarning');

ageInput.addEventListener('input', () => {
    const age = Number(ageInput.value);
    ageWarning.style.display = (age < 1 || age > 100) ? 'inline' : 'none';
});


form.addEventListener('submit', (e) => {
    e.preventDefault();

    const gender = document.querySelector('input[name="gender"]:checked');
    if (!gender) return;

    const age = Number(ageInput.value);
    if (age < 1 || age > 100) {
        alert("Invalid age");
        return;
    }

    const row = `
    <tr>
        <td>${name.value}</td>
        <td>${surname.value}</td>
        <td>${gender.value}</td>
        <td>${age}</td>
        <td>${club.value}</td>
        <td>${reason.value}</td>
    </tr>
    `;

    tableBody.innerHTML += row;
    form.reset();
    ageWarning.style.display = 'none';
});


clearBtn.addEventListener('click', () => {
    form.reset();
    ageWarning.style.display = 'none';
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
