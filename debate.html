<div class="debate-card">
<h1>⚽ Who is the GOAT?</h1>

<form id="goatForm">
    <div class="form-check">
        <input class="form-check-input" type="radio" name="goat" value="Ronaldo">
        <label class="form-check-label">Cristiano Ronaldo</label>
    </div>

    <div class="form-check">
        <input class="form-check-input" type="radio" name="goat" value="Messi">
        <label class="form-check-label">Lionel Messi</label>
    </div>

    <div class="form-check">
        <input class="form-check-input" type="radio" name="goat" value="Pele">
        <label class="form-check-label">Pelé</label>
    </div>

    <div class="form-check">
        <input class="form-check-input" type="radio" name="goat" value="Maradona">
        <label class="form-check-label">Diego Maradona</label>
    </div>

    <div class="form-check">
        <input class="form-check-input" type="radio" name="goat" value="R9">
        <label class="form-check-label">Ronaldo Nazário</label>
    </div>

    <button type="submit" class="btn btn-vote w-100 mt-3">Vote</button>
</form>

<div class="results">
    <h3 class="text-center">Results</h3>

    <p>Cristiano Ronaldo</p>
    <div class="progress">
        <div id="ronaldoBar" class="progress-bar bg-success" style="width:0%">0%</div>
    </div>

    <p>Lionel Messi</p>
    <div class="progress">
        <div id="messiBar" class="progress-bar bg-info" style="width:0%">0%</div>
    </div>

    <p>Pelé</p>
    <div class="progress">
        <div id="peleBar" class="progress-bar bg-warning" style="width:0%">0%</div>
    </div>

    <p>Diego Maradona</p>
    <div class="progress">
        <div id="maradonaBar" class="progress-bar bg-danger" style="width:0%">0%</div>
    </div>

    <p>Ronaldo Nazario</p>
    <div class="progress">
        <div id="r9Bar" class="progress-bar bg-light text-dark" style="width:0%">0%</div>
    </div>
</div>

</div>

<script>
let votes = JSON.parse(localStorage.getItem("goatVotes")) || {
    Ronaldo: 0,
    Messi: 0,
    Pele: 0,
    Maradona: 0,
    R9: 0
};

const form = document.getElementById("goatForm");

form.addEventListener("submit", function(e){
    e.preventDefault();

    const selected = document.querySelector('input[name="goat"]:checked');
    if(!selected){
        alert("Please select a player!");
        return;
    }

    votes[selected.value]++;
    localStorage.setItem("goatVotes", JSON.stringify(votes));

    updateResults();
    form.reset();
});

function updateResults(){
    const total = Object.values(votes).reduce((a,b)=>a+b,0);

    if(total === 0) return;

    document.getElementById("ronaldoBar").style.width = (votes.Ronaldo/total*100)+"%";
    document.getElementById("ronaldoBar").innerText = Math.round(votes.Ronaldo/total*100)+"%";

    document.getElementById("messiBar").style.width = (votes.Messi/total*100)+"%";
    document.getElementById("messiBar").innerText = Math.round(votes.Messi/total*100)+"%";

    document.getElementById("peleBar").style.width = (votes.Pele/total*100)+"%";
    document.getElementById("peleBar").innerText = Math.round(votes.Pele/total*100)+"%";

    document.getElementById("maradonaBar").style.width = (votes.Maradona/total*100)+"%";
    document.getElementById("maradonaBar").innerText = Math.round(votes.Maradona/total*100)+"%";

    document.getElementById("r9Bar").style.width = (votes.R9/total*100)+"%";
    document.getElementById("r9Bar").innerText = Math.round(votes.R9/total*100)+"%";
}

updateResults();
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
